name: Main
on:
  pull_request:
  push:
    tags:
      - "v*.*.*"
    branches:
      - main

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: webiny/action-conventional-commits@v1.3.0

      - name: Install D compiler
        uses: dlang-community/setup-dlang@v2
        with:
          compiler: dmd

      - name: Run tests
        run: dub test
  release:
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - id: asset_name
        run: |
          echo "ASSET_NAME=iex-parser_${{ format('{0}_{1}_{2}.{3}', github.ref_name, runner.os, runner.arch, (runner.os == 'Linux' && 'tar.gz') || '7z') }}" >> "$GITHUB_ENV"

      - uses: actions/checkout@v4

      - uses: webiny/action-conventional-commits@v1.3.0

      - name: Install D compiler
        uses: dlang-community/setup-dlang@v2
        with:
          compiler: ldc

      - name: Create release binary
        run: dub build --build=release

      - name: Package - Linux
        if: runner.os == 'Linux' && runner.arch == 'X64'
        run: tar -zcvf $ASSET_NAME iex-parser

      - name: Package - Windows
        if: runner.os == 'Windows' && runner.arch == 'X64'
        run: 7z a $ASSET_NAME iex-parser.exe

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET_NAME }}
